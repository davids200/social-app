services:

  postgres:
    image: postgres:15
    container_name: social_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: social_app
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: social_redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    container_name: social_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: social_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data:
  neo4j_data: